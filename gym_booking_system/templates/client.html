{% extends "base.html" %}
{% block title %}Gym Booking — Register Client{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <div class="card-title h5">👤 Register New Client</div>
        <div class="card-subtitle text-gray">Enter client details below.</div>
    </div>
    <div class="card-body">
        <form method="POST" action="/client">

            <div class="columns">
                <div class="column col-6">
                    <div class="form-group">
                        <label class="form-label" for="name">First Name <span class="text-error">*</span></label>
                        <input class="form-input" type="text" id="name" name="name" placeholder="e.g. Teresa" required>
                    </div>
                </div>
                <div class="column col-6">
                    <div class="form-group">
                        <label class="form-label" for="surname">Last Name <span class="text-error">*</span></label>
                        <input class="form-input" type="text" id="surname" name="surname" placeholder="e.g. Fato" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email <span class="text-error">*</span></label>
                <input class="form-input" type="email" id="email" name="email" placeholder="e.g. teresa@example.com" required>
                <p class="form-input-hint">Must be a valid email address. Each email can only be registered once.</p>
            </div>

            <div class="form-group" style="margin-top: 1rem;">
                <button class="btn btn-success" type="submit">✓ Register Client</button>
                <a href="/" class="btn btn-link">Cancel</a>
            </div>

        </form>
    </div>
</div>
{% endblock %}
