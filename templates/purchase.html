{% extends "base.html" %}
{% block title %}Purchase — Inventory Manager{% endblock %}

{% block content %}
<div class="hero">
    <h2>🛒 Purchase Product</h2>
    <p class="text-gray">Add new products to the warehouse.</p>
</div>

<div class="columns">
    <div class="column col-6 col-mx-auto">
        <div class="card">
            <div class="card-body">
                <form method="POST" action="{{ url_for('purchase') }}">
                    <div class="form-group">
                        <label class="form-label" for="product_name">Product Name</label>
                        <input class="form-input" type="text" id="product_name" name="product_name"
                               placeholder="e.g. Laptop" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="unit_price">Unit Price</label>
                        <input class="form-input" type="number" id="unit_price" name="unit_price"
                               placeholder="0.00" step="0.01" min="0.01" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="quantity">Quantity</label>
                        <input class="form-input" type="number" id="quantity" name="quantity"
                               placeholder="1" min="1" required>
                    </div>

                    <div class="form-group" style="margin-top: 20px;">
                        <button class="btn btn-primary btn-lg btn-block" type="submit">
                            Confirm Purchase
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <a href="{{ url_for('index') }}" class="btn btn-link">← Back to Dashboard</a>
    </div>
</div>
{% endblock %}
