{% extends "db_base.html" %}
{% block title %}Balance{% endblock %}

{% block content %}
<h2>🏦 Change Account Balance</h2>

<form method="POST" action="/balance" class="form-horizontal" style="max-width: 500px;">
    <div class="form-group">
        <label class="form-label">Operation</label>
        <label class="form-radio form-inline">
            <input type="radio" name="operation" value="add" checked>
            <i class="form-icon"></i> Add to account
        </label>
        <label class="form-radio form-inline">
            <input type="radio" name="operation" value="subtract">
            <i class="form-icon"></i> Subtract from account
        </label>
    </div>
    <div class="form-group">
        <label class="form-label" for="amount">Amount</label>
        <input class="form-input" type="number" id="amount" name="amount" step="0.01" min="0" placeholder="0.00" required>
    </div>
    <div class="form-group">
        <button class="btn btn-primary" type="submit">Apply</button>
        <a href="/" class="btn btn-link">Cancel</a>
    </div>
</form>
{% endblock %}
