{% extends "db_base.html" %}
{% block title %}Sale{% endblock %}

{% block content %}
<h2>💰 Sell Product</h2>

<form method="POST" action="/sale" class="form-horizontal" style="max-width: 500px;">
    <div class="form-group">
        <label class="form-label" for="name">Product Name</label>
        <input class="form-input" type="text" id="name" name="name" placeholder="e.g. Laptop" required>
    </div>
    <div class="form-group">
        <label class="form-label" for="price">Sale Price per Unit</label>
        <input class="form-input" type="number" id="price" name="price" step="0.01" min="0" placeholder="0.00" required>
    </div>
    <div class="form-group">
        <label class="form-label" for="quantity">Quantity</label>
        <input class="form-input" type="number" id="quantity" name="quantity" min="1" placeholder="1" required>
    </div>
    <div class="form-group">
        <button class="btn btn-success" type="submit">Sell</button>
        <a href="/" class="btn btn-link">Cancel</a>
    </div>
</form>
{% endblock %}
