{% extends "base.html" %}
{% block title %}Balance — Inventory Manager{% endblock %}

{% block content %}
<div class="hero">
    <h2>⚖️ Balance Change</h2>
    <p class="text-gray">Add or subtract from the account balance.</p>
</div>

<div class="columns">
    <div class="column col-6 col-mx-auto">
        <div class="card">
            <div class="card-body">
                <form method="POST" action="{{ url_for('balance') }}">
                    <div class="form-group">
                        <label class="form-label">Operation Type</label>
                        <label class="form-radio form-inline">
                            <input type="radio" name="operation" value="add" checked>
                            <i class="form-icon"></i> Add to balance
                        </label>
                        <label class="form-radio form-inline">
                            <input type="radio" name="operation" value="subtract">
                            <i class="form-icon"></i> Subtract from balance
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="amount">Amount</label>
                        <input class="form-input" type="number" id="amount" name="amount"
                               placeholder="0.00" step="0.01" min="0.01" required>
                    </div>
                    <div class="form-group" style="margin-top:20px;">
                        <button class="btn btn-lg btn-block" type="submit"
                                style="background:#5755d9;color:#fff;">Apply Change</button>
                    </div>
                </form>
            </div>
        </div>
        <a href="{{ url_for('index') }}" class="btn btn-link">← Back to Dashboard</a>
    </div>
</div>
{% endblock %}
